<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light only">
<title>WordTap — читай англійською</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { color-scheme: light only; }
  html { background: #FAF9F6; }
  body {
    min-height: 100vh;
    background: #FAF9F6 !important;
    color: #1C2431;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .read-screen { background: #FAF9F6; }

  /* ── Екран вводу ── */
  .input-screen {
    max-width: 680px; margin: 0 auto; padding: 28px 20px 40px;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .brand {
    font-family: 'Literata', Georgia, serif;
    font-size: 26px; font-weight: 600; letter-spacing: -0.01em;
  }
  .brand span { color: #2E5EAA; }
  .tagline { color: #6B7280; font-size: 14px; margin-top: 6px; line-height: 1.5; }
  .start-btn {
    margin-top: 20px; margin-bottom: 4px; padding: 16px; width: 100%;
    background: #2E5EAA; color: #fff; border: none; border-radius: 12px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .start-btn:disabled { background: #C9CDD6; cursor: default; }
  .start-btn:not(:disabled):active { background: #24498A; }
  textarea {
    flex: 1; margin-top: 14px; min-height: 320px; width: 100%;
    border: 1.5px solid #E2E0DA; border-radius: 14px;
    background: #FFFFFF; padding: 18px;
    font-family: 'Literata', Georgia, serif; font-size: 17px; line-height: 1.7;
    color: #1C2431; resize: none; outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: #2E5EAA; }
  textarea::placeholder { color: #A8A6A0; font-style: italic; }

  /* ── Екран читання ── */
  .read-screen { padding-bottom: 260px; }
  .toolbar {
    position: sticky; top: 0; z-index: 5;
    background: rgba(250,249,246,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid #EBE9E3;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
  }
  .toolbar .brand { font-size: 18px; margin-right: auto; }
  .tb-btn {
    border: 1.5px solid #E2E0DA; background: #fff; border-radius: 10px;
    padding: 8px 12px; font-size: 14px; font-weight: 500; color: #1C2431;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .tb-btn:active { background: #F1EFE9; }

  .page {
    max-width: 680px; margin: 0 auto; padding: 26px 22px;
    font-family: 'Literata', Georgia, serif; line-height: 1.85;
    font-size: 21px;
  }
  .sentence { display: inline; }
  .sentence.active-s { background: #EDF2FB; border-radius: 4px; box-shadow: 0 0 0 3px #EDF2FB; }
  .w { cursor: pointer; border-radius: 4px; transition: background .12s; }
  .w:active { background: #D6E2F7; }
  .w.hit { background: #2E5EAA; color: #fff; box-shadow: 0 0 0 2px #2E5EAA; border-radius: 4px; }

  /* ── Нижня панель ── */
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    background: #FFFFFF;
    border-top: 1px solid #E7E5DF;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 30px rgba(28,36,49,.10);
    padding: 18px 20px calc(18px + env(safe-area-inset-bottom));
    max-width: 680px; margin: 0 auto;
    animation: rise .18s ease-out;
    display: none;
  }
  .sheet.open { display: block; }
  @keyframes rise { from { transform: translateY(30px); opacity: 0; } to { transform: none; opacity: 1; } }
  .sheet-head { display: flex; align-items: baseline; gap: 12px; }
  .sheet-word {
    font-family: 'Literata', Georgia, serif;
    font-size: 26px; font-weight: 600; letter-spacing: -0.01em;
  }
  .sheet-tr { font-size: 17px; color: #2E5EAA; font-weight: 500; }
  .sheet-tr.dim { color: #A8A6A0; font-weight: 400; }
  .close {
    margin-left: auto; border: none; background: #F1EFE9; color: #6B7280;
    width: 32px; height: 32px; border-radius: 50%; font-size: 16px;
    cursor: pointer; flex-shrink: 0; align-self: center;
  }
  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .act {
    flex: 1; min-width: 100px;
    border: 1.5px solid #E2E0DA; background: #FAF9F6; border-radius: 10px;
    padding: 11px 8px; font-size: 13.5px; font-weight: 500; color: #1C2431;
    cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap;
  }
  .act:active { background: #EDF2FB; border-color: #2E5EAA; }
  .sent-tr {
    margin-top: 14px; padding: 12px 14px;
    background: #F4F7FC; border-left: 3px solid #2E5EAA; border-radius: 0 10px 10px 0;
    font-size: 15px; line-height: 1.6; color: #1C2431;
    display: none;
  }
  .sent-tr.show { display: block; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Екран вводу -->
<div class="input-screen" id="inputScreen">
  <div class="brand">Word<span>Tap</span></div>
  <div class="tagline">Встав англійський текст і читай. Торкнись слова — почуєш вимову й побачиш переклад.</div>
  <button class="start-btn" id="startBtn" disabled>Спочатку встав текст нижче</button>
  <textarea id="textInput" placeholder="Встав сюди англійський текст…"></textarea>
</div>

<!-- Екран читання -->
<div class="read-screen hidden" id="readScreen">
  <div class="toolbar">
    <div class="brand">Word<span>Tap</span></div>
    <button class="tb-btn" id="fontMinus">A−</button>
    <button class="tb-btn" id="fontPlus">A+</button>
    <button class="tb-btn" id="newTextBtn">Новий текст</button>
  </div>
  <div class="page" id="page"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div class="sheet-word" id="sheetWord"></div>
      <div class="sheet-tr" id="sheetTr"></div>
      <button class="close" id="closeBtn">✕</button>
    </div>
    <div class="actions">
      <button class="act" id="btnWord">🔊 Слово</button>
      <button class="act" id="btnSlow">🐢 Повільно</button>
      <button class="act" id="btnSent">🔊 Речення</button>
      <button class="act" id="btnSentTr">🇺🇦 Речення</button>
    </div>
    <div class="sent-tr" id="sentTr"></div>
  </div>
</div>

<script>
// ─── Стан ───────────────────────────────────────────────────────
let sentences = [];
let active = null; // {word, sIdx}
let fontSize = 21;
const cache = {};

// ─── Мовні утиліти ──────────────────────────────────────────────
function splitIntoSentences(text) {
  return text
    .replace(/\r\n/g, "\n")
    .split(/(?<=[.!?…])\s+|\n+/)
    .map(s => s.trim())
    .filter(Boolean);
}
function splitIntoTokens(sentence) {
  return sentence.match(/[A-Za-z\u2019'-]+|[^A-Za-z\s]+|\s+/g) || [];
}
function isWord(token) { return /[A-Za-z]/.test(token); }

let voiceCache = null;
function getEnglishVoice() {
  if (voiceCache) return voiceCache;
  const voices = window.speechSynthesis.getVoices();
  voiceCache =
    voices.find(v => v.lang === "en-US" && v.localService) ||
    voices.find(v => v.lang && v.lang.startsWith("en")) || null;
  return voiceCache;
}
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => { voiceCache = null; getEnglishVoice(); };

function speak(text, rate = 0.95) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = rate;
  const v = getEnglishVoice();
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ─── Переклад ───────────────────────────────────────────────────
async function translateViaGoogle(text) {
  const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=uk&dt=t&q=" + encodeURIComponent(text);
  const r = await fetch(url);
  const data = await r.json();
  const result = (data[0] || []).map(seg => (seg && seg[0]) || "").join("").trim();
  if (!result) throw new Error("Порожня відповідь Google");
  return result;
}
async function translateViaMyMemory(text) {
  const url = "https://api.mymemory.translated.net/get?langpair=en|uk&q=" + encodeURIComponent(text);
  const r = await fetch(url);
  const data = await r.json();
  const result = data && data.responseData && data.responseData.translatedText;
  if (!result) throw new Error("Порожня відповідь MyMemory");
  return result.trim();
}
async function translateText(text) {
  const errors = [];
  try { return await translateViaGoogle(text); } catch (e) { errors.push("G: " + e.message); }
  try { return await translateViaMyMemory(text); } catch (e) { errors.push("M: " + e.message); }
  throw new Error(errors.join(" | "));
}

// ─── Елементи ───────────────────────────────────────────────────
const el = id => document.getElementById(id);
const inputScreen = el("inputScreen"), readScreen = el("readScreen");
const textInput = el("textInput"), startBtn = el("startBtn");
const page = el("page"), sheet = el("sheet");
const sheetWord = el("sheetWord"), sheetTr = el("sheetTr"), sentTrBox = el("sentTr");

textInput.addEventListener("input", () => {
  const has = textInput.value.trim().length > 0;
  startBtn.disabled = !has;
  startBtn.textContent = has ? "Читати →" : "Спочатку встав текст нижче";
});

startBtn.addEventListener("click", () => {
  sentences = splitIntoSentences(textInput.value);
  if (!sentences.length) return;
  renderPage();
  inputScreen.classList.add("hidden");
  readScreen.classList.remove("hidden");
  window.scrollTo(0, 0);
});

el("newTextBtn").addEventListener("click", () => {
  closePanel();
  readScreen.classList.add("hidden");
  inputScreen.classList.remove("hidden");
});
el("fontMinus").addEventListener("click", () => setFont(fontSize - 2));
el("fontPlus").addEventListener("click", () => setFont(fontSize + 2));
el("closeBtn").addEventListener("click", closePanel);
el("btnWord").addEventListener("click", () => active && speak(active.word));
el("btnSlow").addEventListener("click", () => active && speak(active.word, 0.55));
el("btnSent").addEventListener("click", () => active && speak(sentences[active.sIdx], 0.9));
el("btnSentTr").addEventListener("click", translateActiveSentence);

function setFont(size) {
  fontSize = Math.min(30, Math.max(16, size));
  page.style.fontSize = fontSize + "px";
}

function renderPage() {
  page.innerHTML = "";
  sentences.forEach((s, sIdx) => {
    const sSpan = document.createElement("span");
    sSpan.className = "sentence";
    sSpan.dataset.sIdx = sIdx;
    splitIntoTokens(s).forEach(tok => {
      const t = document.createElement("span");
      t.textContent = tok;
      if (isWord(tok)) {
        t.className = "w";
        t.addEventListener("click", () => onWordTap(tok, sIdx, t));
      }
      sSpan.appendChild(t);
    });
    sSpan.appendChild(document.createTextNode(" "));
    page.appendChild(sSpan);
  });
}

async function onWordTap(word, sIdx, elWord) {
  const clean = word.replace(/^['\u2019-]+|['\u2019-]+$/g, "");
  active = { word: clean, sIdx };

  document.querySelectorAll(".w.hit").forEach(n => n.classList.remove("hit"));
  document.querySelectorAll(".sentence.active-s").forEach(n => n.classList.remove("active-s"));
  elWord.classList.add("hit");
  elWord.closest(".sentence").classList.add("active-s");

  sentTrBox.classList.remove("show");
  sentTrBox.textContent = "";
  sheetWord.textContent = clean;
  sheet.classList.add("open");

  speak(clean);

  const key = "w:" + clean.toLowerCase();
  if (cache[key]) { showTr(cache[key]); return; }
  sheetTr.textContent = "перекладаю…";
  sheetTr.classList.add("dim");
  try {
    const tr = await translateText(clean);
    cache[key] = tr;
    if (active && active.word === clean) showTr(tr);
  } catch (e) {
    showTr("⚠ " + e.message);
  }
}

function showTr(text) {
  sheetTr.textContent = text;
  sheetTr.classList.remove("dim");
}

async function translateActiveSentence() {
  if (!active) return;
  const sentence = sentences[active.sIdx];
  const key = "s:" + sentence;
  if (cache[key]) {
    sentTrBox.textContent = cache[key];
    sentTrBox.classList.add("show");
    return;
  }
  sentTrBox.textContent = "перекладаю…";
  sentTrBox.classList.add("show");
  try {
    const tr = await translateText(sentence);
    cache[key] = tr;
    sentTrBox.textContent = tr;
  } catch (e) {
    sentTrBox.textContent = "⚠ " + e.message;
  }
}

function closePanel() {
  active = null;
  sheet.classList.remove("open");
  document.querySelectorAll(".w.hit").forEach(n => n.classList.remove("hit"));
  document.querySelectorAll(".sentence.active-s").forEach(n => n.classList.remove("active-s"));
  window.speechSynthesis.cancel();
}
</script>
</body>
</html>
